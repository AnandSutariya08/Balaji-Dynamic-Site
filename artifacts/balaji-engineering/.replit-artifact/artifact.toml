kind = "web"
previewPath = "/"
title = "Balaji Engineering Works"
version = "1.0.0"
id = "artifacts/balaji-engineering"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21298

[services.development]
run = "pnpm --filter @workspace/balaji-engineering run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/balaji-engineering", "run", "build" ]
publicDir = "artifacts/balaji-engineering/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21298"
BASE_PATH = "/"
