    <g fill="#ac3c3c">
      <rect x="468" y="240" width="18" height="72" rx="9"/>
      <rect x="610" y="214" width="18" height="72" rx="9"/>
      <rect x="694" y="199" width="18" height="72" rx="9"/>
    </g>
