      <circle cx="430" cy="396" r="24"/>
      <circle cx="620" cy="360" r="24"/>
      <circle cx="790" cy="328" r="24"/>
      <circle cx="360" cy="538" r="24"/>
      <circle cx="530" cy="506" r="24"/>
      <circle cx="700" cy="474" r="24"/>
      <circle cx="870" cy="442" r="24"/>
