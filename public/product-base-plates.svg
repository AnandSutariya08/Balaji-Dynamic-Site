<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">Base plates illustration</title>
  <desc id="desc">A technical illustration of steel base plates with hole patterns and stiffeners.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f7f5f1"/>
      <stop offset="1" stop-color="#ece0da"/>
    </linearGradient>
    <linearGradient id="plate" x1="0" x2="1">
      <stop offset="0" stop-color="#708190"/>
      <stop offset="1" stop-color="#c6cfd5"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="900" fill="url(#bg)"/>
  <circle cx="1010" cy="180" r="160" fill="#ac3c3c" opacity=".1"/>
  <circle cx="160" cy="760" r="210" fill="#1a1a1a" opacity=".04"/>
  <g transform="translate(180 220)">
